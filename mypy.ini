# Typechecking is scoped to the web-API surface (the newest code, written
# type-clean). follow_imports=silent uses the rest of src/ for inference
# without reporting on modules that predate mypy in this repo.
[mypy]
python_version = 3.12
files = src/api, src/review_actions.py, tests/test_api_server.py
follow_imports = silent
check_untyped_defs = True
warn_redundant_casts = True
no_implicit_optional = True
